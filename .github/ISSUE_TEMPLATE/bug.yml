name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual
      description: What did you expect to happen, and what happened instead?
      placeholder: |-
        Expected: ...
        Actual: ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |-
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Optional context like browser, device, or screenshots.
      placeholder: Browser, OS, device, links, screenshots, or anything else useful.
